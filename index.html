<style>
  body{background:#000;color:#fff;font-family:'Rajdhani',sans-serif;overflow-x:hidden}
  .orbitron{font-family:'Orbitron',sans-serif}
  .cursor{position:fixed;width:40px;height:40px;border:2px solid #00ffff;border-radius:50%;pointer-events:none;z-index:99999;mix-blend-mode:difference;transform:translate(-50%,-50%);transition:0.1s}
  .cursor::after{content:'';position:absolute;width:12px;height:12px;background:#ff00ff;border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%)}
  .grain{position:fixed;inset:0;pointer-events:none;background:url('https://grainy-gradients.vercel.app/noise.svg');opacity:0.1}
  .glitch{position:relative}
  .glitch::before,.glitch::after{content:attr(data-text);position:absolute;top:0;left:0;width:100%;height:100%}
  .glitch::before{animation:g1 0.8s infinite;color:#00ffff;clip-path:polygon(0 0,100% 0,100% 45%,0 45%)}
  .glitch::after{animation:g2 0.8s infinite;color:#ff00ff;clip-path:polygon(0 55%,100% 55%,100% 100%,0 100%)}
  @keyframes g1{0%,100%{transform:translate(0)}20%{transform:translate(-10px,10px)}40%{transform:translate(10px,-10px)}}
  @keyframes g2{0%,100%{transform:translate(0)}60%{transform:translate(-10px,-10px)}80%{transform:translate(10px,10px)}}
  .neon{text-shadow:0 0 30px #00ffff,0 0 60px #00ffff}
</style>

<script>
// কার্সার + পার্টিকেল + অ্যানিমেশন একই আছে – পরের পেজেও কপি করে নিবি
const cursor = document.getElementById('cursor');
document.addEventListener('mousemove', e => {
  cursor.style.left = e.clientX + 'px';
  cursor.style.top = e.clientY + 'px';
});

const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
canvas.width = innerWidth; canvas.height = innerHeight;
let particles = [];
for(let i=0;i<200;i++){
  particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*2+1,s:Math.random()*2,c:['#00ffff','#ff00ff','#8b5cf6'][Math.floor(Math.random()*3)]});
}
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles.forEach(p=>{ctx.fillStyle=p.c;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
    p.x+=p.s*(Math.random()>.5?1:-1); p.y+=p.s*(Math.random()>.5?1:-1);
    if(p.x<0||p.x>canvas.width)p.x=canvas.width/2;
    if(p.y<0||p.y>canvas.height)p.y=canvas.height/2;
  });
  requestAnimationFrame(draw);
}draw();

gsap.from("#pic",{y:-300,rotation:360,duration:2,ease:"bounce.out"});
</script>
