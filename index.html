<style>
  body { background: #000; color: #fff; font-family: 'Rajdhani', sans-serif; overflow-x: hidden; }
  .orbitron { font-family: 'Orbitron', sans-serif; }
  .cursor { position: fixed; width: 40px; height: 40px; border: 2px solid #00ffff; border-radius: 50%; pointer-events: none; z-index: 99999; mix-blend-mode: difference; transform: translate(-50%,-50%); transition: 0.1s; }
  .cursor::after { content: ''; position: absolute; width: 10px; height: 10px; background: #ff00ff; border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%,-50%); }
  .grain { position: fixed; inset: 0; pointer-events: none; background: url('https://grainy-gradients.vercel.app/noise.svg'); opacity: 0.1; z-index: 10; }
  .glitch { position: relative; }
  .glitch::before, .glitch::after { content: attr(data-text); position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
  .glitch::before { animation: glitch-1 0.8s infinite; color: #00ffff; clip-path: polygon(0 0, 100% 0, 100% 45%, 0 45%); }
  .glitch::after { animation: glitch-2 0.8s infinite; color: #ff00ff; clip-path: polygon(0 55%, 100% 55%, 100% 100%, 0 100%); }
  @keyframes glitch-1 { 0%,100%{transform:translate(0)} 20%{transform:translate(-8px,8px)} 40%{transform:translate(8px,-8px)} }
  @keyframes glitch-2 { 0%,100%{transform:translate(0)} 60%{transform:translate(-8px,-8px)} 80%{transform:translate(8px,8px)} }
  .neon { text-shadow: 0 0 20px #00ffff, 0 0 40px #00ffff; }
</style>

<script>
// Custom Cursor
const cursor = document.getElementById('cursor');
document.addEventListener('mousemove', e => {
  cursor.style.left = e.clientX + 'px';
  cursor.style.top = e.clientY + 'px';
});

// 3D Background
const canvas = document.getElementById('bgCanvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];
for(let i=0; i<150; i++){
  particles.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    size: Math.random()*3,
    speedX: Math.random()*2-1,
    speedY: Math.random()*2-1,
    color: ['#00ffff','#ff00ff','#8b5cf6'][Math.floor(Math.random()*3)]
  });
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles.forEach(p => {
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x,p.y,p.size,p.size);
    p.x += p.speedX;
    p.y += p.speedY;
    if(p.x<0 || p.x>canvas.width) p.speedX *= -1;
    if(p.y<0 || p.y>canvas.height) p.speedY *= -1;
  });
  requestAnimationFrame(animate);
}
animate();

window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

// GSAP
gsap.from("#photo", {y: -200, opacity: 0, duration: 1.5, ease: "bounce.out"});
gsap.from("h1", {opacity: 0, scale: 0.5, duration: 2, delay: 0.5});
</script>
