<style>
/* ----------------------------------------------------
   GLOBAL COLOR SYSTEM
---------------------------------------------------- */
:root {
  --bg: #ffffff;
  --bg-soft: #f5f6f8;
  --card-bg: #ffffff;
  --text-main: #111;
  --text-soft: #555;
  --border: #e5e7eb;

  --accent: #6366f1;
  --accent-soft: rgba(99,102,241,0.12);

  --shadow-soft: 0 4px 18px rgba(0,0,0,0.08);
  --shadow-card: 0 12px 32px rgba(15,23,42,0.12);

  --qr-bg: #ffffff;
  --qr-border: rgba(0,0,0,0.1);
}

body.dark {
  --bg: #0b0f19;
  --bg-soft: #111827;
  --card-bg: #1a2333;
  --text-main: #f3f4f6;
  --text-soft: #a5a7ae;
  --border: #2d3748;

  --accent: #818cf8;
  --accent-soft: rgba(129,140,248,0.18);

  --shadow-soft: 0 6px 22px rgba(0,0,0,0.55);
  --shadow-card: 0 14px 38px rgba(0,0,0,0.65);

  --qr-bg: #1e293b;
  --qr-border: rgba(255,255,255,0.1);
}

/* ----------------------------------------------------
   RESET + BASE
---------------------------------------------------- */
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg);
  color: var(--text-main);
  font-family: "Inter", sans-serif;
  transition: background 0.25s ease, color 0.25s ease;
}
a { color: inherit; text-decoration: none; }
img { max-width: 100%; display: block; }

.container {
  max-width: 1180px;
  margin: auto;
  padding: 0 1.6rem;
}

.section { padding: 3.4rem 0; }
.section-title {
  font-size: 2rem;
  font-weight: 700;
}
.section-subtitle {
  font-size: 0.95rem;
  margin-top: .4rem;
  color: var(--text-soft);
}

/* ----------------------------------------------------
   NAVBAR
---------------------------------------------------- */
.navbar {
  position: sticky;
  top: 0;
  z-index: 50;
  background: var(--bg-soft);
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(14px);
}
.navbar-inner {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: .85rem 1.4rem;
}
.nav-brand {
  display: flex;
  align-items: center;
  gap: .6rem;
}
.nav-logo {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: conic-gradient(#6366f1, #a855f7, #ec4899, #22c55e, #6366f1);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  color: white;
}
.nav-title { font-size: .95rem; font-weight: 700; }
.nav-sub { font-size: .72rem; color: var(--text-soft); }

.nav-links {
  display: flex;
  gap: 1.2rem;
  align-items: center;
}
.nav-link {
  font-size: .9rem;
  color: var(--text-soft);
}
.nav-link:hover { color: var(--text-main); }

.nav-controls {
  display: flex;
  gap: .7rem;
}
.theme-toggle {
  padding: .35rem .75rem;
  border-radius: 999px;
  font-size: .85rem;
  border: 1px solid var(--border);
  background: var(--card-bg);
  cursor: pointer;
}

/* MOBILE MENU */
.nav-toggle {
  display: none;
  width: 34px;
  height: 30px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--card-bg);
  align-items: center;
  justify-content: center;
}
.nav-toggle span {
  width: 18px;
  height: 2px;
  background: var(--text-main);
  position: relative;
}
.nav-toggle span:before,
.nav-toggle span:after {
  content: "";
  position: absolute;
  width: 18px;
  height: 2px;
  background: var(--text-main);
  left: 0;
}
.nav-toggle span:before { top: -5px; }
.nav-toggle span:after { top: 5px; }

.nav-links-mobile {
  display: none;
  flex-direction: column;
  gap: .8rem;
  background: var(--bg-soft);
  padding: 1rem 1.4rem;
  border-top: 1px solid var(--border);
}
.nav-links-mobile.open { display: flex; }

/* ----------------------------------------------------
   HERO
---------------------------------------------------- */
.hero {
  padding: 4.2rem 0 3rem;
}
.hero-inner {
  display: grid;
  grid-template-columns: minmax(0, 1.6fr) minmax(260px, 1fr);
  gap: 2.8rem;
  align-items: center;
}

.hero-kicker {
  background: var(--accent-soft);
  color: var(--accent);
  border: 1px solid var(--accent);
  padding: .35rem .9rem;
  border-radius: 999px;
  font-size: .8rem;
  display: inline-block;
  margin-bottom: 1rem;
}
.hero-title {
  font-size: clamp(2.6rem, 6vw, 3.6rem);
  line-height: 1.14;
  font-weight: 800;
  margin-bottom: .45rem;
}
.hero-title span {
  background: linear-gradient(90deg,#6366f1,#a855f7,#22c55e);
  -webkit-background-clip: text;
  color: transparent;
}
.hero-sub {
  color: var(--text-soft);
  margin-bottom: 1.2rem;
  font-size: 1rem;
  line-height: 1.75;
  max-width: 32rem;
}

.hero-actions {
  display: flex;
  gap: .8rem;
  margin-bottom: 1.1rem;
}
.btn {
  padding: .75rem 1.45rem;
  border-radius: 999px;
  font-size: .9rem;
}
.btn-primary {
  background: linear-gradient(135deg,#6366f1,#4f46e5);
  color: white;
  border: none;
}
.btn-outline {
  background: transparent;
  color: var(--text-main);
  border: 1px solid var(--border);
}

.hero-note {
  color: var(--text-soft);
  font-size: .85rem;
}

/* Hero Right */
.hero-side {
  background: var(--card-bg);
  border-radius: 18px;
  padding: 1.3rem 1.4rem;
  border: 1px solid var(--border);
  box-shadow: var(--shadow-card);
}
.hero-side-title {
  font-size: 1rem;
  font-weight: 600;
  margin-bottom: .4rem;
}
.hero-side-text {
  color: var(--text-soft);
  font-size: .85rem;
  line-height: 1.55;
}

@media(max-width:850px){
  .hero-inner {
    grid-template-columns: 1fr;
  }
  .hero-side { order: -1; }
}

/* ----------------------------------------------------
   DIGITAL VISITING CARD
---------------------------------------------------- */
.card-section {
  padding-top: 1rem;
  padding-bottom: 3rem;
}

.visiting-wrapper {
  display: flex;
  justify-content: center;
}

.visiting-card {
  position: relative;
  width: 100%;
  max-width: 520px;
  border-radius: 24px;
  padding: 1.4rem 1.5rem;
  background: var(--card-bg);
  border: 1px solid var(--border);
  box-shadow: var(--shadow-card);
  overflow: hidden;
}

/* soft gradient glow inside card */
.visiting-card::before {
  content: "";
  position: absolute;
  inset: -40%;
  background:
    radial-gradient(circle at 0 0, rgba(99,102,241,0.25), transparent 55%),
    radial-gradient(circle at 100% 100%, rgba(56,189,248,0.25), transparent 55%);
  opacity: 0.55;
  pointer-events: none;
}

.card-content {
  position: relative;
  display: grid;
  grid-template-columns: minmax(0,1.4fr) minmax(0,1fr);
  gap: 1rem;
  align-items: center;
}

.card-info h2 {
  font-size: 1.4rem;
  font-weight: 700;
}
.card-info h2 span {
  font-size: 1rem;
  opacity: .8;
  font-weight: 400;
}
.card-role {
  margin-top: .2rem;
  font-size: .85rem;
  color: var(--text-soft);
}
.card-tagline {
  margin-top: .55rem;
  font-size: .9rem;
  color: var(--text-main);
}
.card-meta {
  margin-top: .55rem;
  font-size: .78rem;
  color: var(--text-soft);
}

/* card chips */
.card-contact {
  margin-top: .75rem;
  display: flex;
  flex-wrap: wrap;
  gap: .4rem;
}
.card-chip {
  padding: .32rem .7rem;
  border-radius: 999px;
  background: var(--bg-soft);
  border: 1px solid var(--border);
  font-size: .78rem;
  color: var(--text-main);
}

/* right side */
.card-right {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.card-photo {
  width: 120px;
  height: 120px;
  border-radius: 24px;
  padding: 3px;
  background: conic-gradient(#6366f1,#a855f7,#ec4899,#22c55e,#6366f1);
}
.card-photo-inner {
  width: 100%;
  height: 100%;
  border-radius: 20px;
  overflow: hidden;
}
.card-photo-inner img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.card-handle {
  margin-top: .45rem;
  font-size: .8rem;
  color: var(--text-soft);
}

/* QR CODE BOX ------------------------------ */

.qr-box {
  margin-top: 1rem;
  text-align: center;
}

.qr-wrapper {
  display: inline-block;
  padding: .55rem;
  border-radius: 14px;
  background: var(--qr-bg);
  border: 1px solid var(--qr-border);
  box-shadow: 0 0 22px rgba(0,0,0,0.15);
  transition: background .25s ease, border .25s ease;
}

body.dark .qr-wrapper {
  box-shadow: 0 0 22px rgba(255,255,255,0.08);
}

.qr-wrapper img {
  width: 95px;
  height: 95px;
  border-radius: 10px;
}

/* SCAN ME text */
.qr-text {
  margin-top: .25rem;
  font-size: .75rem;
  color: var(--text-soft);
}

/* RESPONSIVE FIX */
@media(max-width: 850px){
  .card-content {
    grid-template-columns: 1fr;
    text-align: center;
  }
  .card-right {
    margin-top: .6rem;
  }
}

/* ----------------------------------------------------

---------------------------------------------------- */

.shop-inner {

<script>
document.addEventListener("DOMContentLoaded", () => {

  const body = document.body;
  const themeBtns = document.querySelectorAll(".theme-toggle");
  const navToggle = document.querySelector(".nav-toggle");
  const mobileMenu = document.querySelector(".nav-links-mobile");

  /* DARK / LIGHT MODE */
  let darkMode = false;
  themeBtns.forEach(btn => {
    btn.addEventListener("click", () => {
      darkMode = !darkMode;
      if(darkMode){
        body.classList.add("dark");
        themeBtns.forEach(b => b.textContent = "☀️");
      } else {
        body.classList.remove("dark");
        themeBtns.forEach(b => b.textContent = "🌙");
      }
    });
  });

  /* MOBILE MENU */
  navToggle.addEventListener("click", () => {
    mobileMenu.classList.toggle("open");
  });

});
</script>
