<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio | Habibur Rahman</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {font-family:'Inter',sans-serif;background:#0a0a0a;color:#fff;margin:0;}
    nav {position:fixed;top:0;width:100%;z-index:99;backdrop-filter:blur(12px);background:#000000dd;padding:20px 5%;display:flex;justify-content:space-between;align-items:center;}
    .container {max-width:1200px;margin:0 auto;padding:120px 20px 80px;text-align:center;}
    .grid {display:grid;grid-template-columns:repeat(auto-fit,minmax(350px,1fr));gap:30px;}
    .project {border-radius:20px;overflow:hidden;position:relative;}
    .project img {width:100%;height:250px;object-fit:cover;transition:.5s;}
    .project:hover img {transform:scale(1.1);}
    .overlay {position:absolute;inset:0;background:linear-gradient(transparent,rgba(0,0,0,0.9));display:flex;flex-direction:column;justify-content:end;padding:30px;color:#fff;}
    h1 {font-size:50px;margin-bottom:60px;background:linear-gradient(90deg,#8b5cf6,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
  </style>
</head>
<body>
  <nav>
    <h1 class="text-2xl font-bold text-purple-400">Habibur.</h1>
    <ul class="flex space-x-8">
      <li><a href="index.html" class="hover:text-purple-400">Home</a></li>
      <li><a href="portfolio.html" class="text-purple-400">Portfolio</a></li>
    </ul>
  </nav>

  <div class="container">
    <h1>Portfolio</h1>
    <div class="grid">
      <div class="project">
        <img src="https://via.placeholder.com/600x400/1a0033/8b5cf6?text=E-Commerce+Site" alt="">
        <div class="overlay">
          <h3>E-Commerce Platform</h3>
          <p>Next.js + Stripe</p>
        </div>
      </div>
      <div class="project">
        <img src="https://via.placeholder.com/600x400/002b36/06b6d4?text=3D+Portfolio" alt="">
        <div class="overlay">
          <h3>3D Interactive Site</h3>
          <p>Three.js + React</p>
        </div>
      </div>
      <div class="project">
        <img src="https://via.placeholder.com/600x400/33001a/ec4899?text=Viral+App" alt="">
        <div class="overlay">
          <h3>Viral Content App</h3>
          <p>React Native</p>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
